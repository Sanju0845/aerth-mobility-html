<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <title>Voice of Trust Admin | Aerth Mobility</title>
  <meta name="description" content="Admin panel for managing Voice of Trust testimonials.">
  <meta name="author" content="Aerth Mobility">
  <meta name="robots" content="noindex, nofollow">
  
  <link rel="stylesheet" href="evx.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  
  <style>
    /* ══════════════════════════════════════════════════════
       Voice of Trust Admin Panel
       ══════════════════════════════════════════════════════ */
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 6rem 1.5rem 4rem;
    }
    
    .admin-header {
      margin-bottom: 2rem;
    }
    
    .admin-header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    
    .admin-header p {
      color: var(--text-muted);
      font-size: 1rem;
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 1.5rem;
      transition: gap 0.3s;
    }
    
    .back-btn:hover {
      gap: 0.8rem;
    }
    
    /* Form Section */
    .form-section {
      background: var(--bg-elevated);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 2rem;
      border: 1px solid var(--border);
    }
    
    .form-section h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }
    
    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .form-group.full-width {
      grid-column: 1 / -1;
    }
    
    .form-group label {
      font-weight: 600;
      color: var(--text);
      font-size: 0.95rem;
    }
    
    .form-group label span {
      color: var(--accent);
    }
    
    .form-group input,
    .form-group textarea {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,148,255,0.1);
    }
    
    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      justify-content: flex-end;
    }
    
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .btn-primary:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0,148,255,0.3);
    }
    
    .btn-secondary {
      background: var(--bg-hover);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-secondary:hover {
      background: var(--bg-elevated);
    }
    
    /* Entries List */
    .entries-section {
      background: var(--bg-elevated);
      border-radius: var(--radius-lg);
      padding: 2rem;
      border: 1px solid var(--border);
    }
    
    .entries-section h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    
    .entry-count {
      background: var(--accent);
      color: #fff;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 600;
    }
    
    .entry-card {
      background: var(--bg);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      display: flex;
      gap: 1.5rem;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .entry-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    
    .entry-video-thumb {
      width: 160px;
      height: 90px;
      background: #000;
      border-radius: var(--radius);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .entry-video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .entry-video-thumb .play-icon {
      position: absolute;
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .entry-details {
      flex: 1;
    }
    
    .entry-details h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    
    .entry-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    
    .entry-meta span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    
    .entry-quote {
      font-style: italic;
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    
    .entry-actions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .btn-edit {
      background: var(--bg-hover);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-edit:hover {
      background: var(--bg-elevated);
    }
    
    .btn-delete {
      background: rgba(255,0,0,0.1);
      color: #d32f2f;
      border: 1px solid rgba(255,0,0,0.2);
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-delete:hover {
      background: rgba(255,0,0,0.2);
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
    
    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    
    .empty-state h3 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    
    /* Success Message */
    .success-message {
      position: fixed;
      top: 2rem;
      right: 2rem;
      background: var(--accent);
      color: #fff;
      padding: 1rem 1.5rem;
      border-radius: var(--radius);
      box-shadow: 0 4px 16px rgba(0,148,255,0.3);
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    /* Password Modal */
    .password-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    
    .password-modal-content {
      background: var(--bg-elevated);
      border-radius: var(--radius-lg);
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    
    .password-modal h2 {
      margin-bottom: 1rem;
      color: var(--text);
    }
    
    .password-modal input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    
    .password-modal input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- Password Protection Modal -->
  <div id="passwordModal" class="password-modal">
    <div class="password-modal-content">
      <h2>🔒 Admin Access</h2>
      <p style="color: var(--text-muted); margin-bottom: 1rem;">Enter admin password to continue</p>
      <input type="password" id="adminPassword" placeholder="Password" onkeypress="if(event.key==='Enter')checkPassword()">
      <button class="btn-primary" style="width: 100%;" onclick="checkPassword()">Access</button>
      <p id="passwordError" style="color: #d32f2f; margin-top: 0.5rem; font-size: 0.875rem; display: none;">Invalid password</p>
    </div>
  </div>

  <div class="admin-container" id="adminContent" style="display: none;">
    <a href="admin.html" class="back-btn">← Back to Dashboard</a>
    
    <div class="admin-header">
      <h1>🎥 Voice of Trust Admin</h1>
      <p>Manage customer video testimonials and success stories</p>
    </div>
    
    <!-- Add/Edit Form -->
    <div class="form-section">
      <h2 id="formTitle">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Add New Voice of Trust Entry
      </h2>
      
      <form id="voiceOfTrustForm" onsubmit="saveEntry(event)">
        <input type="hidden" id="entryId" value="">
        
        <div class="form-grid">
          <div class="form-group full-width">
            <label for="videoUrl">Video URL <span>*</span></label>
            <input type="url" id="videoUrl" name="videoUrl" required placeholder="https://youtube.com/watch?v=... or direct video URL">
          </div>
          
          <div class="form-group">
            <label for="personName">Person Name <span>*</span></label>
            <input type="text" id="personName" name="personName" required placeholder="e.g., Rajesh Kumar">
          </div>
          
          <div class="form-group">
            <label for="title">Title/Designation <span>*</span></label>
            <input type="text" id="title" name="title" required placeholder="e.g., Fleet Manager">
          </div>
          
          <div class="form-group">
            <label for="business">Business/Company</label>
            <input type="text" id="business" name="business" placeholder="e.g., Delhi Transport Co.">
          </div>
          
          <div class="form-group">
            <label for="location">Location <span>*</span></label>
            <input type="text" id="location" name="location" required placeholder="e.g., New Delhi">
          </div>
          
          <div class="form-group full-width">
            <label for="quote">Testimonial Quote <span>*</span></label>
            <textarea id="quote" name="quote" required placeholder="Share their experience with Aerth Mobility..."></textarea>
          </div>
        </div>
        
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="resetForm()">Cancel</button>
          <button type="submit" class="btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            Save Entry
          </button>
        </div>
      </form>
    </div>
    
    <!-- Existing Entries -->
    <div class="entries-section">
      <h2>
        Existing Entries
        <span class="entry-count" id="entryCount">0</span>
      </h2>
      
      <div id="entriesList">
        <!-- Entries will be loaded here -->
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
          </svg>
          <h3>No Entries Yet</h3>
          <p>Add your first Voice of Trust entry above</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Admin password check
    const ADMIN_PASSWORD = 'aerthadmin123';
    let entries = [];
    
    function checkPassword() {
      const input = document.getElementById('adminPassword').value;
      if (input === ADMIN_PASSWORD) {
        document.getElementById('passwordModal').classList.add('hidden');
        document.getElementById('adminContent').style.display = 'block';
        loadEntries();
      } else {
        document.getElementById('passwordError').style.display = 'block';
      }
    }
    
    // Check if already logged in
    function checkAdminSession() {
      const session = localStorage.getItem('aerth_admin_session');
      if (session) {
        try {
          const data = JSON.parse(session);
          if (data.password === ADMIN_PASSWORD && new Date(data.expiry) > new Date()) {
            document.getElementById('passwordModal').classList.add('hidden');
            document.getElementById('adminContent').style.display = 'block';
            loadEntries();
            return;
          }
        } catch (e) {}
        localStorage.removeItem('aerth_admin_session');
      }
    }
    
    // Load entries from localStorage
    function loadEntries() {
      const stored = localStorage.getItem('aerth_voice_of_trust');
      if (stored) {
        entries = JSON.parse(stored);
      }
      renderEntries();
    }
    
    // Save entries to localStorage
    function saveEntries() {
      localStorage.setItem('aerth_voice_of_trust', JSON.stringify(entries));
    }
    
    // Render entries list
    function renderEntries() {
      const container = document.getElementById('entriesList');
      const count = document.getElementById('entryCount');
      
      count.textContent = entries.length;
      
      if (entries.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
            </svg>
            <h3>No Entries Yet</h3>
            <p>Add your first Voice of Trust entry above</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = entries.map(entry => `
        <div class="entry-card">
          <div class="entry-video-thumb">
            <img src="${getYouTubeThumbnail(entry.videoUrl)}" alt="Video thumbnail">
          </div>
          <div class="entry-details">
            <h3>${escapeHtml(entry.personName)}</h3>
            <div class="entry-meta">
              <span>📋 ${escapeHtml(entry.title)}</span>
              ${entry.business ? `<span>🏢 ${escapeHtml(entry.business)}</span>` : ''}
              <span>📍 ${escapeHtml(entry.location)}</span>
            </div>
            <p class="entry-quote">"${escapeHtml(entry.quote)}"</p>
          </div>
          <div class="entry-actions">
            <button class="btn-edit" onclick="editEntry('${entry.id}')">Edit</button>
            <button class="btn-delete" onclick="deleteEntry('${entry.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }
    
    // Get YouTube thumbnail
    function getYouTubeThumbnail(url) {
      const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
      if (match) {
        return `https://img.youtube.com/vi/${match[1]}/mqdefault.jpg`;
      }
      return 'evx-s.png';
    }
    
    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Save entry
    function saveEntry(event) {
      event.preventDefault();
      
      const form = event.target;
      const id = document.getElementById('entryId').value;
      
      const entry = {
        id: id || 'vot-' + Date.now(),
        videoUrl: form.videoUrl.value,
        personName: form.personName.value,
        title: form.title.value,
        business: form.business.value,
        location: form.location.value,
        quote: form.quote.value,
        publishedDate: new Date().toISOString().split('T')[0]
      };
      
      if (id) {
        // Update existing
        const index = entries.findIndex(e => e.id === id);
        if (index !== -1) {
          entries[index] = entry;
        }
      } else {
        // Add new
        entries.unshift(entry);
      }
      
      saveEntries();
      renderEntries();
      resetForm();
      showSuccess(id ? 'Entry updated successfully!' : 'Entry added successfully!');
    }
    
    // Edit entry
    function editEntry(id) {
      const entry = entries.find(e => e.id === id);
      if (!entry) return;
      
      document.getElementById('entryId').value = entry.id;
      document.getElementById('videoUrl').value = entry.videoUrl;
      document.getElementById('personName').value = entry.personName;
      document.getElementById('title').value = entry.title;
      document.getElementById('business').value = entry.business || '';
      document.getElementById('location').value = entry.location;
      document.getElementById('quote').value = entry.quote;
      
      document.getElementById('formTitle').innerHTML = `
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Edit Voice of Trust Entry
      `;
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    // Delete entry
    function deleteEntry(id) {
      if (!confirm('Are you sure you want to delete this entry?')) return;
      
      entries = entries.filter(e => e.id !== id);
      saveEntries();
      renderEntries();
      showSuccess('Entry deleted successfully!');
    }
    
    // Reset form
    function resetForm() {
      document.getElementById('voiceOfTrustForm').reset();
      document.getElementById('entryId').value = '';
      document.getElementById('formTitle').innerHTML = `
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Add New Voice of Trust Entry
      `;
    }
    
    // Show success message
    function showSuccess(message) {
      const msg = document.createElement('div');
      msg.className = 'success-message';
      msg.textContent = message;
      document.body.appendChild(msg);
      setTimeout(() => msg.remove(), 3000);
    }
    
    // Initialize
    document.addEventListener('DOMContentLoaded', checkAdminSession);
  </script>
</body>
</html>
