<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <title>Voice of Trust Admin | Aerth Mobility</title>
  <meta name="description" content="Admin panel for managing Voice of Trust testimonials.">
  <meta name="author" content="Aerth Mobility">
  <meta name="robots" content="noindex, nofollow">
  
  <link rel="stylesheet" href="evx.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      color: #f1f5f9;
    }
    
    .dashboard {
      min-height: 100vh;
      padding: 2rem;
    }
    
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto 2rem;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .header-logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .header-logo svg {
      width: 24px;
      height: 24px;
      color: white;
    }
    
    .header-title h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }
    
    .header-title p {
      font-size: 0.875rem;
      color: #94a3b8;
      margin: 0;
    }
    
    .header-actions {
      display: flex;
      gap: 0.75rem;
    }
    
    .btn-header {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      border: none;
    }
    
    .btn-back {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.2);
      color: #94a3b8;
    }
    
    .btn-back:hover {
      color: #f1f5f9;
      border-color: rgba(59, 130, 246, 0.3);
    }
    
    .btn-logout {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }
    
    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.3);
    }
    
    .dashboard-content {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .stat-card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .stat-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(16, 185, 129, 0.2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .stat-icon svg {
      width: 24px;
      height: 24px;
      color: #3b82f6;
    }
    
    .stat-info h3 {
      font-size: 0.875rem;
      color: #94a3b8;
      font-weight: 500;
      margin: 0 0 0.25rem;
    }
    
    .stat-info p {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }
    
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    
    @media (max-width: 1024px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }
    
    .panel-card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 16px;
      overflow: hidden;
    }
    
    .panel-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .panel-header h2 {
      font-size: 1.125rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .panel-body {
      padding: 1.5rem;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    
    @media (max-width: 640px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    
    .form-group.full-width {
      grid-column: 1 / -1;
    }
    
    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .form-group label span {
      color: #3b82f6;
    }
    
    .form-group input,
    .form-group textarea {
      padding: 0.75rem 1rem;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.6);
      color: #f1f5f9;
      font-size: 0.95rem;
      transition: all 0.3s;
    }
    
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    
    .form-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      justify-content: flex-end;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #10b981);
      color: #fff;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
    }
    
    .btn-secondary {
      background: rgba(148, 163, 184, 0.1);
      color: #94a3b8;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    
    .btn-secondary:hover {
      background: rgba(148, 163, 184, 0.2);
      color: #f1f5f9;
    }
    
    .entries-list {
      max-height: 600px;
      overflow-y: auto;
    }
    
    .entry-card {
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      gap: 1rem;
      transition: all 0.3s;
    }
    
    .entry-card:hover {
      border-color: rgba(59, 130, 246, 0.3);
      transform: translateY(-2px);
    }
    
    .entry-thumb {
      width: 120px;
      height: 68px;
      background: #000;
      border-radius: 8px;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }
    
    .entry-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .entry-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.4);
    }
    
    .entry-play svg {
      width: 24px;
      height: 24px;
      color: white;
    }
    
    .entry-info {
      flex: 1;
      min-width: 0;
    }
    
    .entry-info h4 {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin: 0 0 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .entry-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      font-size: 0.8rem;
      color: #64748b;
      margin-bottom: 0.5rem;
    }
    
    .entry-meta span {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    
    .entry-quote {
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .entry-actions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .btn-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      background: transparent;
      color: #94a3b8;
    }
    
    .btn-icon:hover {
      background: rgba(148, 163, 184, 0.1);
      color: #f1f5f9;
    }
    
    .btn-icon.delete:hover {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem 1.5rem;
      color: #64748b;
    }
    
    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
      opacity: 0.3;
    }
    
    .empty-state h3 {
      font-size: 1.125rem;
      color: #94a3b8;
      margin: 0 0 0.5rem;
    }
    
    .empty-state p {
      font-size: 0.875rem;
      margin: 0;
    }
    
    .success-toast {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
      z-index: 1000;
      display: none;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @media (max-width: 768px) {
      .dashboard { padding: 1rem; }
      .dashboard-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
      .header-actions { width: 100%; }
      .btn-header { flex: 1; justify-content: center; }
      .stats-grid { grid-template-columns: 1fr; }
      .entry-card { flex-direction: column; }
      .entry-thumb { width: 100%; height: 120px; }
      .entry-actions { flex-direction: row; justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <!-- Password Protection Check -->
  <script>
    (function() {
      const session = localStorage.getItem('aerth_admin_session');
      if (!session) {
        window.location.href = 'admin.html';
        return;
      }
      try {
        const data = JSON.parse(session);
        if (data.password !== 'aerthadmin123' || new Date(data.expiry) <= new Date()) {
          localStorage.removeItem('aerth_admin_session');
          window.location.href = 'admin.html';
        }
      } catch (e) {
        localStorage.removeItem('aerth_admin_session');
        window.location.href = 'admin.html';
      }
    })();
  </script>

  <div class="dashboard">
    <!-- Header -->
    <header class="dashboard-header">
      <div class="header-left">
        <div class="header-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div class="header-title">
          <h1>Voice of Trust Admin</h1>
          <p>Manage customer testimonials</p>
        </div>
      </div>
      <div class="header-actions">
        <a href="admin.html" class="btn-header btn-back">← Back to Dashboard</a>
        <button class="btn-header btn-logout" onclick="logout()">Logout</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="dashboard-content">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <div class="stat-info">
            <h3>Total Entries</h3>
            <p id="entryCount">0</p>
          </div>
        </div>
      </div>

      <!-- Two Column Layout -->
      <div class="dashboard-grid">
        <!-- Add/Edit Form -->
        <div class="panel-card">
          <div class="panel-header">
            <h2 id="formTitle">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12h14"/>
              </svg>
              Add New Entry
            </h2>
          </div>
          <div class="panel-body">
            <form id="voiceOfTrustForm" onsubmit="saveEntry(event)">
              <input type="hidden" id="entryId" value="">
              
              <div class="form-grid">
                <div class="form-group full-width">
                  <label for="videoUrl">Video URL <span>*</span></label>
                  <input type="url" id="videoUrl" name="videoUrl" required placeholder="https://youtube.com/watch?v=...">
                </div>
                
                <div class="form-group">
                  <label for="personName">Person Name <span>*</span></label>
                  <input type="text" id="personName" name="personName" required placeholder="e.g., Rajesh Kumar">
                </div>
                
                <div class="form-group">
                  <label for="title">Title/Designation <span>*</span></label>
                  <input type="text" id="title" name="title" required placeholder="e.g., Fleet Manager">
                </div>
                
                <div class="form-group">
                  <label for="business">Business/Company</label>
                  <input type="text" id="business" name="business" placeholder="e.g., Delhi Transport Co.">
                </div>
                
                <div class="form-group">
                  <label for="location">Location <span>*</span></label>
                  <input type="text" id="location" name="location" required placeholder="e.g., New Delhi">
                </div>
                
                <div class="form-group full-width">
                  <label for="quote">Testimonial Quote <span>*</span></label>
                  <textarea id="quote" name="quote" required placeholder="Share their experience with Aerth Mobility..."></textarea>
                </div>
              </div>
              
              <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="resetForm()">Cancel</button>
                <button type="submit" class="btn btn-primary">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"/>
                  </svg>
                  Save Entry
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- Existing Entries -->
        <div class="panel-card">
          <div class="panel-header">
            <h2>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
              </svg>
              Existing Entries
            </h2>
          </div>
          <div class="panel-body">
            <div id="entriesList" class="entries-list">
              <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                </svg>
                <h3>No Entries Yet</h3>
                <p>Add your first Voice of Trust entry</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Success Toast -->
  <div id="successToast" class="success-toast"></div>

  <script>
    const ADMIN_PASSWORD = 'aerthadmin123';
    let entries = [];
    
    function logout() {
      localStorage.removeItem('aerth_admin_session');
      window.location.href = 'admin.html';
    }
    
    async function loadEntries() {
      try {
        const response = await fetch('/api/voice-of-trust');
        entries = await response.json();
        renderEntries();
      } catch (error) {
        console.error('Error loading entries:', error);
        showSuccess('Error loading entries: ' + error.message);
      }
    }
    
    function renderEntries() {
      const container = document.getElementById('entriesList');
      const count = document.getElementById('entryCount');
      
      count.textContent = entries.length;
      
      if (entries.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
            </svg>
            <h3>No Entries Yet</h3>
            <p>Add your first Voice of Trust entry</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = entries.map(entry => `
        <div class="entry-card">
          <div class="entry-thumb">
            <img src="${getYouTubeThumbnail(entry.videoUrl)}" alt="Video thumbnail">
            <div class="entry-play">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
              </svg>
            </div>
          </div>
          <div class="entry-info">
            <h4>${escapeHtml(entry.personName)}</h4>
            <div class="entry-meta">
              <span>📋 ${escapeHtml(entry.title)}</span>
              ${entry.business ? `<span>🏢 ${escapeHtml(entry.business)}</span>` : ''}
              <span>📍 ${escapeHtml(entry.location)}</span>
            </div>
            <p class="entry-quote">"${escapeHtml(entry.quote)}"</p>
          </div>
          <div class="entry-actions">
            <button class="btn-icon" onclick="editEntry('${entry.id}')" title="Edit">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button class="btn-icon delete" onclick="deleteEntry('${entry.id}')" title="Delete">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </div>
        </div>
      `).join('');
    }
    
    function getYouTubeThumbnail(url) {
      const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
      if (match) {
        return `https://img.youtube.com/vi/${match[1]}/mqdefault.jpg`;
      }
      return 'evx-s.png';
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    async function saveEntry(event) {
      event.preventDefault();
      
      const form = event.target;
      const id = document.getElementById('entryId').value;
      
      const entry = {
        videoUrl: form.videoUrl.value,
        personName: form.personName.value,
        title: form.title.value,
        business: form.business.value,
        location: form.location.value,
        quote: form.quote.value,
        publishedDate: new Date().toISOString().split('T')[0]
      };
      
      try {
        let response;
        if (id) {
          response = await fetch(`/api/voice-of-trust/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: ADMIN_PASSWORD, entry })
          });
        } else {
          response = await fetch('/api/voice-of-trust', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: ADMIN_PASSWORD, entry })
          });
        }
        
        const result = await response.json();
        
        if (result.success) {
          await loadEntries();
          resetForm();
          showSuccess(id ? 'Entry updated!' : 'Entry added!');
        } else {
          showSuccess('Error: ' + (result.error || 'Unknown error'));
        }
      } catch (error) {
        console.error('Error saving entry:', error);
        showSuccess('Error saving entry: ' + error.message);
      }
    }
    
    function editEntry(id) {
      const entry = entries.find(e => e.id === id);
      if (!entry) return;
      
      document.getElementById('entryId').value = entry.id;
      document.getElementById('videoUrl').value = entry.videoUrl;
      document.getElementById('personName').value = entry.personName;
      document.getElementById('title').value = entry.title;
      document.getElementById('business').value = entry.business || '';
      document.getElementById('location').value = entry.location;
      document.getElementById('quote').value = entry.quote;
      
      document.getElementById('formTitle').innerHTML = `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Edit Entry
      `;
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    async function deleteEntry(id) {
      if (!confirm('Are you sure you want to delete this entry?')) return;
      
      try {
        const response = await fetch(`/api/voice-of-trust/${id}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: ADMIN_PASSWORD })
        });
        
        const result = await response.json();
        
        if (result.success) {
          await loadEntries();
          showSuccess('Entry deleted!');
        } else {
          showSuccess('Error: ' + (result.error || 'Unknown error'));
        }
      } catch (error) {
        console.error('Error deleting entry:', error);
        showSuccess('Error deleting entry: ' + error.message);
      }
    }
    
    function resetForm() {
      document.getElementById('voiceOfTrustForm').reset();
      document.getElementById('entryId').value = '';
      document.getElementById('formTitle').innerHTML = `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Add New Entry
      `;
    }
    
    function showSuccess(message) {
      const toast = document.getElementById('successToast');
      toast.textContent = message;
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 3000);
    }
    
    document.addEventListener('DOMContentLoaded', loadEntries);
  </script>
</body>
</html>
