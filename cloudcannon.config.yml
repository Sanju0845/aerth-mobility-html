# 1. Basic Site Info
site_name: Aerth Mobility

# 2. Key for Plain HTML Sites
# This tells CloudCannon you aren't using a generator like Jekyll or Hugo.
ssg_name: static

# 3. Collections (Your Pages)
collections_config:
  pages:
    name: Pages
    path: /
    # This filter ensures only your HTML pages show up in this list
    filter:
      base: none
      include_extensions:
        - .html
    output: true
    # This helps CloudCannon match the URL to the file
    url: /[relative_path]

# 4. Define Inputs (How the sidebar looks)
_inputs:
  title:
    type: text
    label: Browser Tab Title
  hero_title:
    type: text
    label: Main Heading
  hero_description:
    type: textarea
    label: Sub-description
  content:
    type: html
    options:
      format: p h1 h2 h3 bold italic link
  address:
    type: textarea
    label: Address
  phone:
    type: text
    label: Phone Number
  email:
    type: email
    label: Email Address

# 5. Media & Uploads
paths:
  uploads: images/uploads
  static: /

# 6. Building for Static Site
# Since your files are already HTML, we don't want CloudCannon to change them.
build:
  output_path: ./ # The source is the output
